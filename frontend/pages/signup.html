<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitebox AI - Sign Up</title>
    <style>
        /* Theme Variables - Light aur Dark dono ke liye */
        :root { 
            --bg: #000; --text: #fff; --btn-bg: #fff; --btn-text: #000; --border: rgba(255,255,255,0.2); 
        }
        @media (prefers-color-scheme: light) {
            :root { 
                --bg: #fff; --text: #000; --btn-bg: #000; --btn-text: #fff; --border: rgba(0,0,0,0.1); 
            }
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { width: 340px; text-align: center; padding: 25px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid var(--border); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); box-sizing: border-box; font-size: 14px; }
        
        .btn-container { display: flex; gap: 10px; margin-bottom: 20px; }
        
        /* Navigation Buttons */
        .nav-btn-inactive { flex: 1; background: transparent; color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 6px; cursor: pointer; opacity: 0.6; }
        .nav-btn-active { flex: 1; background: var(--btn-bg); color: var(--btn-text); border: none; padding: 8px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        
        /* Main Action Button */
        .action-btn { width: 100%; background: var(--btn-bg); color: var(--btn-text); border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        .footer-text { margin-top: 15px; font-size: 13px; color: gray; }
        .footer-text a { color: var(--text); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 style="margin-bottom: 5px;">Join Whitebox AI</h2>
    <p style="font-size: 14px; color: gray; margin-bottom: 20px;">Create your account to get started</p>

    <div class="btn-container">
        <button class="nav-btn-inactive" onclick="window.location.href='signin.html'">Sign In</button>
        <button class="nav-btn-active">Sign Up</button>
    </div>

    <form onsubmit="handleSignUp(event)">
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Create Password (min 6 chars)" required minlength="6">
        <button type="submit" class="action-btn">Create Account</button>
    </form>

    <div class="footer-text">
        Already have an account? <a href="signin.html">Log In</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="../js/auth.js"></script>

</body>
</html>
