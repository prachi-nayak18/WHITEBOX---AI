<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whitebox Chat</title>
  <link rel="stylesheet" href="/frontend/css/app.css"/>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>WHITEBOX</h2>
    <button onclick="newChat()">+ New</button>
    <button onclick="history()">History</button>
</div>

  <!-- Chat Area -->
  <div class="main">

    <!-- Chat Messages -->
    <div id="chatBox" class="chat-box"></div>

    <!-- Input -->
    <form id="chatForm" class="chat-bar">
      <span>📎</span>
      <input type="text" id="userInput" placeholder="Message Whitebox..." />
      <button type="submit">➤</button>
      <button type="button">🎤</button>
    </form>

  </div>
<script src="/frontend/js/chat.js"></script>

<script>
window.onload = function() {
  const msg = localStorage.getItem("firstMessage");
  if (msg) {
    localStorage.removeItem("firstMessage");
    addMessage(msg, "user");
    sendMessageToAI(msg).then(reply => addMessage(reply, "bot"));
  }
};
</script>
</body>
</html>
