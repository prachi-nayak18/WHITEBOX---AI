<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitebox AI - Chat History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: 'Inter', sans-serif; }
        .history-card:hover { background-color: #1a1a1a; border-color: #333; }
        .delete-btn:hover { color: #ff4d4d; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-5xl mx-auto flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
        <div class="flex items-center">
            <a href="index.html" class="text-gray-500 hover:text-white transition">
                <span>←</span> Back
            </a>
            <h1 class="text-2xl font-bold ml-8 flex items-center gap-3">
                <span class="text-xl">🕒</span> Chat History
            </h1>
        </div>
        
        <div class="relative">
            <input type="text" placeholder="Search conversations..." 
                class="bg-[#161616] border border-gray-800 text-sm rounded-full py-2 px-10 w-full md:w-64 focus:outline-none focus:border-yellow-500 transition">
            <span class="absolute left-4 top-2.5 text-gray-500">🔍</span>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        
        <div class="mb-10">
            <h3 class="text-gray-500 text-[10px] uppercase tracking-[0.2em] mb-4 font-bold">Today</h3>
            <div class="space-y-3">
                
                <div class="history-card group flex items-center justify-between p-4 rounded-xl border border-transparent bg-[#111] transition-all cursor-pointer">
                    <div class="flex items-center gap-4 overflow-hidden">
                        <span class="text-gray-600 group-hover:text-yellow-500">💬</span>
                        <div class="truncate">
                            <h4 class="font-medium text-sm truncate">How to build a Whitebox AI app with Gemini?</h4>
                            <p class="text-xs text-gray-500 mt-1">2 hours ago • 1.2k tokens used</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 opacity-0 group-hover:opacity-100 transition">
                        <button class="text-gray-500 hover:text-white text-xs">Rename</button>
                        <button class="delete-btn text-gray-500 text-xs">Delete</button>
                    </div>
                </div>

                <div class="history-card group flex items-center justify-between p-4 rounded-xl border border-transparent bg-[#111] transition-all cursor-pointer">
                    <div class="flex items-center gap-4 overflow-hidden">
                        <span class="text-gray-600 group-hover:text-yellow-500">💬</span>
                        <div class="truncate">
                            <h4 class="font-medium text-sm truncate">Fixing Tailwind CSS layout issues</h4>
                            <p class="text-xs text-gray-500 mt-1">5 hours ago • 450 tokens used</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 opacity-0 group-hover:opacity-100 transition">
                        <button class="text-gray-500 hover:text-white text-xs">Rename</button>
                        <button class="delete-btn text-gray-500 text-xs">Delete</button>
                    </div>
                </div>

            </div>
        </div>

        <div class="mb-10">
            <h3 class="text-gray-500 text-[10px] uppercase tracking-[0.2em] mb-4 font-bold">Yesterday</h3>
            <div class="space-y-3">
                
                <div class="history-card group flex items-center justify-between p-4 rounded-xl border border-transparent bg-[#111] transition-all cursor-pointer">
              <div class="flex items-center gap-4 overflow-hidden">
                        <span class="text-gray-600 group-hover:text-yellow-500">💬</span>
                        <div class="truncate">
                            <h4 class="font-medium text-sm truncate">Deep learning model architectures explained</h4>
                            <p class="text-xs text-gray-500 mt-1">Yesterday at 4:30 PM</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 opacity-0 group-hover:opacity-100 transition">
                        <button class="delete-btn text-gray-500 text-xs">Delete</button>
                    </div>
                </div>

            </div>
        </div>

        <div class="mt-12 pt-6 border-t border-gray-900 text-center">
            <button class="text-gray-600 hover:text-red-500 text-xs font-bold uppercase tracking-widest transition">
                Clear All History
            </button>
        </div>

    </div>
</body>
</html>
