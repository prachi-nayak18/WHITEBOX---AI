<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitebox AI - Sign In</title>
    <style>
        /* Theme Variables */
        :root { --bg: #000; --text: #fff; --btn-bg: #fff; --btn-text: #000; --border: rgba(255,255,255,0.2); }
        @media (prefers-color-scheme: light) {
            :root { --bg: #fff; --text: #000; --btn-bg: #000; --btn-text: #fff; --border: rgba(0,0,0,0.1); }
        }

        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { width: 320px; text-align: center; padding: 20px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); box-sizing: border-box; }
        
        .btn-container { display: flex; gap: 10px; margin: 20px 0; }
        
        .primary-btn { flex: 1; background: var(--btn-bg); color: var(--btn-text); border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .secondary-btn { flex: 1; background: transparent; color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        .google-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
    /* Google Translate widget ko sahi jagah rakhne ke liye */
#google_translate_element {
    text-align: right;
    padding: 10px;
    position: absolute;
    top: 10px;
    right: 10px;
}

/* Default "Powered by Google" text ko hide karne ke liye (Optionally) */
.goog-logo-link, .goog-te-gadget span {
    display: none !important;
}
.goog-te-gadget {
    color: transparent !important;
    font-size: 0 !important;
}
.goog-te-combo {
    padding: 5px;
    border-radius: 5px;
    background: var(--bg); /* Aapki theme ke sath match karega */
    color: var(--text);
    border: 1px solid var(--border);
}
    </style>
</head>
<body>

<div class="auth-card">
    <h2>Whitebox AI</h2>
    <p>Sign in to continue</p>

    <div class="btn-container">
        <button class="primary-btn">Sign In</button>
        <button class="secondary-btn" onclick="window.location.href='signup.html'">Sign Up</button>
    </div>

    <form onsubmit="handleLogin(event)">
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="primary-btn" style="width:100%; margin-top:10px;">Sign In</button>
    </form>

    <div style="margin: 15px 0; color: gray;">OR</div>

    <button class="google-btn" onclick="handleGoogleLogin()">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18">
        Continue with Google
    </button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="../js/auth.js"></script>
</script>
</body>
</html>
